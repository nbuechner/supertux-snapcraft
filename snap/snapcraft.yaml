name: supertux
base: core24
title: SuperTux
contact: https://github.com/SuperTux/supertux/issues
website: https://www.supertux.org
issues: https://github.com/SuperTux/supertux/issues
source-code: https://github.com/SuperTux/supertux
donation: https://www.supertux.org/donate.html
license: GPL-3.0
adopt-info: supertux
summary: SuperTux
description: |
    SuperTux is a jump'n'run game with strong inspiration from the Super Mario Bros. games for the various Nintendo platforms.

    Run and jump through multiple worlds, fighting off enemies by jumping on them, bumping them from below or tossing objects at them, grabbing power-ups and other stuff on the way.
confinement: strict
grade: stable

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

apps:
  supertux:
    command: bin/desktop-launch $SNAP/usr/games/supertux2
    plugs:
      - x11
      - wayland
      - unity7
      - opengl
      - audio-playback
      - joystick
      - home
      - network

    environment:
      DBUS_FATAL_WARNINGS: 0

parts:
  supertux:
    # Note: We can't use the cmake plugin for now, since it breaks the external libs
    # like tinygettext and most likely other dependencies as well. Path issues?.
    # Fortunately, we can use the autotools wrapper the SuperTux developers provide.
    #
    # This wrapper simply calls cmake itself, but in this case,
    # we don't run into any path issues. However, we could execute
    # the cmake commands manually, but since the wrapper is already there...

    prime:
      - -**/libGLU.so*
      - -**/libGLX_mesa.so*
      - -**/libboost_filesystem.so*
      - -**/libboost_locale.so*
      - -**/libboost_thread.so*
      - -**/libdconf.so*
      - -**/libicuio.so*
      - -**/libicutest.so*
      - -**/libicutu.so*
      - -**/libpulse-simple.so*
      - -**/libunity-extras.so*
      - -**/libvulkan.so*
      - -**/libOpenGL.so*
      - -**/libXxf86vm.so*
      - -**/libxcb-glx.so*

    plugin: nil
    after: [desktop-glib-only]
    source: https://github.com/supertux/supertux.git
    override-build: |
      last_committed_tag="$(git -C ../src describe --tags `git rev-list --tags --max-count=1`)"
      trimmed_tag="$(echo $last_committed_tag | sed 's/desc\///' | sed 's/git//' | sed 's/^v//')"
      last_released_tag="$(snap info supertux | awk '$1 == "latest/beta:" { print $2 }')"
      # If the latest tag from the upstream project has not been released to
      # beta, build that tag instead of master.
      if [ "${trimmed_tag}" != "${last_released_tag}" ]; then
        git fetch
        git checkout "${last_committed_tag}"
        craftctl set version=$(git -C ../src describe --tags `git rev-list --tags --max-count=1` | sed 's/desc\///' | sed 's/git//' | sed 's/^v//')
      else
        craftctl set version=$(git describe --tags)
      fi
      ./configure -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_BUILD_TYPE=RELEASE -DCMAKE_INSTALL_PREFIX=$SNAPCRAFT_PART_INSTALL/usr/
      cd build
      make -j$(nproc)
      make install
      craftctl default

    build-packages:
      - g++
      - cmake
      - build-essential
      - libsdl2-dev
      - libsdl2-image-dev
      - libogg-dev
      - libvorbis-dev
      - libopenal-dev
      - libglew-dev
      - libboost-date-time1.83-dev
      - libboost-filesystem1.83-dev
      - libboost-locale1.83-dev
      - libboost-system1.83-dev
      - libcurl4-openssl-dev
      - libfreetype6-dev
      - libraqm-dev
      - libfribidi-dev
      - libphysfs-dev
      - libharfbuzz-dev
      - libglm-dev
      - pkg-config
      - libfmt-dev
    stage-packages:
      - libfmt9
      - libstdc++6
      - libgl1-mesa-dri
      - libglx-mesa0
      - libglu1-mesa
      - libwayland-egl1-mesa
      - libsdl2-2.0-0
      - libsdl2-image-2.0-0
      - libopenal1
      - libglew2.2
      - libvorbis0a
      - libvorbisfile3
      - libdbusmenu-glib4
      - libunity-protocol-private0
      - libunity9
      - libcurl4
      - libfreetype6
      - libraqm0
      - libfribidi0
      - libphysfs1
      - libboost-filesystem1.83.0
      - libboost-locale1.83.0
      - libboost-system1.83.0
      - libboost-thread1.83.0
      - locales-all
      - libharfbuzz-bin

  desktop-glib-only:
    source: https://github.com/ubuntu/snapcraft-desktop-helpers.git
    source-subdir: glib-only
    plugin: make
    build-packages:
      - libglib2.0-dev
    stage-packages:
      - libglib2.0-bin

